  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>

  <script>

    const socket = io();

    const sendMessageBtn = document.getElementById('sendMessageBtn');
    const inputMessage = document.getElementById('message');
    const allMessages = document.getElementById('show-messages');


    // here the recieve the chat-message from server
    socket.on('chat-message', (data) => {

      // console.log(data);

      // const para = document.createElement('p');
      // para.innerText = data;


      // allMessages.appendChild(para);

      const para = document.createElement('p');
      para.className = data.id === socket.id ? 'self' : 'other';
      para.innerText = (data.id === socket.id ? 'you' : 'friend') + '\n' + data.text;

      allMessages.appendChild(para);
      allMessages.scrollTop = allMessages.scrollHeight;


    });



    sendMessageBtn.addEventListener('click', (e) => {

      const message = inputMessage.value;
      console.log(message);

      // data send to server pass basically event
      // which is user fill the input feild
      socket.emit('user-message', message);

      inputMessage.value = '';

    });





  </script>
